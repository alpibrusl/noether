site_name: Noether
site_description: Typed, content-addressed composition for agent-built pipelines.
site_url: https://alpibrusl.github.io/noether/
repo_url: https://github.com/alpibrusl/noether
repo_name: alpibrusl/noether
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

exclude_docs: |
  agents/
  research/
  roadmap/
  requirements.txt

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Install: install.md
  - Concepts: concepts.md
  - Usage: usage.md
  - Examples: examples.md
  - Roadmap: roadmap.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alpibrusl/noether

copyright: Copyright &copy; 2024-2026 alpibrusl — Licensed under EUPL-1.2
