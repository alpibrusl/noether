site_name: Noether
site_description: Verified composition platform for AI agents. Content-addressed stages, structural typing, Nix execution.
site_url: https://alpibrusl.github.io/noether/
repo_url: https://github.com/alpibrusl/noether
repo_name: alpibrusl/noether
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - minify:
      minify_html: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - footnotes
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - First Composition: getting-started/first-composition.md
  - Architecture:
    - Overview: architecture/overview.md
    - Type System: architecture/type-system.md
    - Stage Identity: architecture/stage-identity.md
    - Composition Engine: architecture/composition-engine.md
    - Nix Execution: architecture/nix-execution.md
  - CLI Reference:
    - Commands: cli/commands.md
    - Output Format (ACLI): cli/acli.md
  - Stdlib:
    - Overview: stdlib/overview.md
    - Stage Catalogue: stdlib/catalogue.md
  - Guides:
    - Building Custom Stages: guides/custom-stages.md
    - Composition Graphs: guides/composition-graphs.md
    - LLM-Powered Compose: guides/llm-compose.md
    - Semantic Search: guides/semantic-search.md
    - Remote Registry (noether-cloud): guides/remote-registry.md
  - Case Studies:
    - Four Search Engines: case-studies/search-engines.md
    - Benchmark: case-studies/benchmark.md
  - Roadmap: roadmap.md
  - Research:
    - NoetherReact: research/noether-react.md
    - WASM Target: research/wasm-target.md
    - Cloud Registry: research/cloud-registry.md
  - Contributing: contributing.md
  - Changelog: changelog.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alpibrusl/noether
  version:
    provider: mike

